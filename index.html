<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Keuangan 3.4</title>
    <link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  <div class="app-container">
  <h1>Aplikasi Keuangan</h1>
  
  <div class="input-group">
    <label for="keterangan">Keterangan</label>
    <input id="keterangan" placeholder="Masukkan keterangan">
  </div>

  <div class="input-group">
    <label for="nominal">Nominal</label>
    <input id="nominal" placeholder="Rp 0">
  </div>

  <div class="input-group">
    <label for="tipe">Tipe</label>
    <select id="tipe">
      <option value="Pemasukan">Pemasukan</option>
      <option value="Pengeluaran">Pengeluaran</option>
    </select>
  </div>

  <button class="btn-submit" onclick="kirimData()">Simpan</button>
  
  <div class="sheet-buttons">

  <button class="icon-btn" onclick="bukaSpreadsheet()" title="Buka Spreadsheet">
    <i class="fa-solid fa-table"></i>
  </button>

  <button class="icon-btn" onclick="downloadSpreadsheet()" title="Download Spreadsheet">
    <i class="fa-solid fa-download"></i>
  </button>

</div>
  
  <div class="warning">
  ⚠️ Jangan lupa download laporan bulanan sebelum data direset setiap awal bulan!
</div>

  <p class="credit">credit -@affanears-</p>
  
  <p class="version">Versi 3.4</p>
</div>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">  

<div class="menu-container">

  <!-- tombol titik tiga -->
  <button class="menu-btn" onclick="toggleMenu()">
    <i class="fa-solid fa-ellipsis-vertical"></i>
  </button>

  <!-- menu settings -->
  <div class="menu-dropdown" id="menuDropdown">
    <div class="menu-item">
      <label class="dark-toggle">
        Dark Mode
        <input type="checkbox" id="darkSwitch" onchange="toggleDarkMode()">
      </label>
    </div>
  </div>

</div>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script  src="./script.js"></script>

  </body>
  
</html>
